<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Casse-Brique</title>
<style>
  body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#111; font-family:sans-serif; }
  canvas { background:#000; border:2px solid #fff; }
  #ui { position:fixed; top:10px; left:10px; color:#fff; font-size:18px; }
  #msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:32px; display:none; text-align:center; }
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span> | Vies: <span id="lives">3</span></div>
<div id="msg"></div>
<canvas id="game" width="480" height="640"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const msgEl = document.getElementById('msg');

let score = 0;
let lives = 3;
let running = true;

// Balle
const ball = {
  x: canvas.width/2,
  y: canvas.height-30,
  dx: 3,
  dy: -3,
  radius: 8
};

// Raquette
const paddle = {
  width: 90,
  height: 12,
  x: (canvas.width-90)/2,
  speed: 7
};

let rightPressed = false;
let leftPressed = false;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') rightPressed = true;
  if (e.key === 'ArrowLeft') leftPressed = true;
  if (e.key === ' ' && !running) restart();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowRight') rightPressed = false;
  if (e.key === 'ArrowLeft') leftPressed = false;
});

// Souris / tactile
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const relativeX = e.clientX - rect.left;
  if (relativeX > 0 && relativeX < canvas.width) {
    paddle.x = relativeX - paddle.width/2;
  }
});

// Briques
const brickRowCount = 5;
const brickColumnCount = 7;
const brickWidth = 56;
const brickHeight = 18;
const brickPadding = 8;
const brickOffsetTop = 40;
const brickOffsetLeft = 18;

let bricks = [];
function initBricks() {
  bricks = [];
  for (let c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r] = { x: 0, y: 0, status: 1 };
    }
  }
}
initBricks();

const colors = ['#ff5555','#ffb86c','#f1fa8c','#50fa7b','#8be9fd'];

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) {
        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;
        ctx.fillStyle = colors[r % colors.length];
        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
      }
    }
  }
}

function collisionDetection() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      const b = bricks[c][r];
      if (b.status === 1) {
        if (ball.x > b.x && ball.x < b.x + brickWidth &&
            ball.y > b.y && ball.y < b.y + brickHeight) {
          ball.dy = -ball.dy;
          b.status = 0;
          score += 10;
          scoreEl.textContent = score;
          if (score === brickRowCount * brickColumnCount * 10) {
            endGame(true);
          }
        }
      }
    }
  }
}

function endGame(win) {
  running = false;
  msgEl.style.display = 'block';
  msgEl.textContent = (win ? '🎉 Gagné !' : '💀 Game Over') + ' - Appuie sur Espace pour rejouer';
}

function restart() {
  score = 0;
  lives = 3;
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  ball.x = canvas.width/2;
  ball.y = canvas.height-30;
  ball.dx = 3;
  ball.dy = -3;
  paddle.x = (canvas.width-paddle.width)/2;
  initBricks();
  msgEl.style.display = 'none';
  running = true;
  draw();
}

function draw() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBricks();
  drawBall();
  drawPaddle();
  collisionDetection();

  // Rebonds murs
  if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) {
    ball.dx = -ball.dx;
  }
  if (ball.y + ball.dy < ball.radius) {
    ball.dy = -ball.dy;
  } else if (ball.y + ball.dy > canvas.height - ball.radius - paddle.height - 10) {
    if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
      // Effet selon point d'impact
      const hitPos = (ball.x - (paddle.x + paddle.width/2)) / (paddle.width/2);
      ball.dx = hitPos * 5;
      ball.dy = -Math.abs(ball.dy);
    } else if (ball.y + ball.dy > canvas.height - ball.radius) {
      lives--;
      livesEl.textContent = lives;
      if (lives <= 0) {
        endGame(false);
        return;
      } else {
        ball.x = canvas.width/2;
        ball.y = canvas.height-30;
        ball.dx = 3;
        ball.dy = -3;
        paddle.x = (canvas.width-paddle.width)/2;
      }
    }
  }

  // Déplacement raquette clavier
  if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
  if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;

  ball.x += ball.dx;
  ball.y += ball.dy;

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
